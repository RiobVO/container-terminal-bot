services:
  bot:
    build: .
    restart: always
    env_file: .env
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_PATH=/app/data/container.db
    volumes:
      - bot-data:/app/data

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis-data:/data

volumes:
  bot-data:
  redis-data:
